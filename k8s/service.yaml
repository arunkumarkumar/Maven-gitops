apiVersion: v1
kind: Service
metadata:
  name: my-app-service
  namespace: default
  labels:
    app: my-app
spec:
  selector:
    app: my-app       
  type: NodePort
  ports:
  - name: http
    port: 80          
    targetPort: 8080  
    nodePort: 30080   # External port on the EC2/Minikube node
