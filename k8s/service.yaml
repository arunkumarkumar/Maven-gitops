apiVersion: v1
kind: Service
metadata:
  name: my-app-service
  namespace: default
  labels:
    app: my-app
spec:
  selector:
    app: my-app       # Routes traffic to pods with this label
  type: NodePort
  ports:
  - name: http
    port: 80          # Service port inside the cluster
    targetPort: 8080  # Port the Spring Boot app listens on
    nodePort: 30080   # External port on the EC2/Minikube node
