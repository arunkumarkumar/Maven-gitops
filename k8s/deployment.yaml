apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
  namespace: default
  labels:
    app: my-app
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1         # Allow 1 extra pod during update
      maxUnavailable: 0   # Never go below 3 running pods during update
  template:
    metadata:
      labels:
        app: my-app
        version: v1
      annotations:
        # Prometheus will auto-scrape this pod at /actuator/prometheus
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
      - name: my-app
        # This image tag is auto-updated by Harness CI on every build
        image: arunedits/my-app:64
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http

        # Environment variables — injected at runtime
        env:
        - name: APP_ENV
          value: "production"

        # Liveness probe — Kubernetes restarts pod if this fails
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3

        # Readiness probe — pod only receives traffic when this passes
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 5
          failureThreshold: 3

        # Resource limits — prevents one pod from consuming all EC2 resources
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
